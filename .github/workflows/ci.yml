# CI Workflow
name: CI

on:
  push:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # - name: Install Dependenacies
      #   run: pip install pytest pylint

      # - name: Pylint report
      #   run: pylint calculator.py || true
      #   continue-on-error: true

      # - name: Run Tests
      #   run: pytest
      - name: Build Docker Image
        run: docker build -t my-nginx-image .
        
      - name: Run Docker Container
        run: docker run -d -p 8080:80 --name my-nginx-container my-nginx-image

      - name: Display Logs
        run: docker logs my-nginx-container
        
      - name: Test Nginx
        run: curl -I http://localhost:8080

      - name: Stop and Remove Container
        run: docker stop my-nginx-container && docker rm my-nginx-container
  
  :