# CI Workflow
name: CI

on:
  push:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - name: Build Docker Image
        run: docker build -t my-nginx-image .
        
      - name: Run Docker Container
        run: docker run -d -p 8080:80 --name my-nginx-container my-nginx-image
  
  logs:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v4
      
      - name: Docker PS
        run: docker ps
      
      - name: Display Logs
        run: docker logs my-nginx-container
        
  deploy:
    runs-on: ubuntu-latest
    needs: logs

    steps:
      - uses: actions/checkout@v4
      
      - name: Deploy 
        run: curl -I http://localhost:8080